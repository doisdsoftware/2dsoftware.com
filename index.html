
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>2D Software | Tecnologia de Alto Impacto</title>
    <script>
      (function(){
        try {
          const _warn = console.warn.bind(console);
          console.warn = function(...args){
            try {
              const joined = args.map(a=>String(a)).join(' ');
              if (/Removing unpermitted intrinsics|lockdown-install|SES|MetaMask|THREE\.Clock/i.test(joined)) return;
            } catch(e) {}
            _warn(...args);
          };

          window.addEventListener('error', function(ev){
            try {
              if (ev && ev.message && /Removing unpermitted intrinsics|lockdown-install|SES/i.test(ev.message)) {
                ev.preventDefault && ev.preventDefault();
                return;
              }
            } catch(e) {}
          }, true);

          window.addEventListener('unhandledrejection', function(ev){
            try {
              const reason = ev && ev.reason;
              if (reason && reason.message && /Failed to connect to MetaMask|MetaMask extension not found/i.test(reason.message)) {
                ev.preventDefault && ev.preventDefault();
                return;
              }
            } catch(e) {}
          }, true);
        } catch (e) {}
      })();
    </script>
    <!-- Tailwind will be processed locally via PostCSS in production -->

    <!-- Preload app logos so globe particle textures appear with page images -->

    <link rel="preload" as="image" href="/logo/logo%20app%20city%20explorer.png">
    <link rel="preload" as="image" href="/logo/Logo%20app%20fidelidade.png">
